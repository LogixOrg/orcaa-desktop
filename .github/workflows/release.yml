name: Build & Release Desktop

# Triggers:
# - Push tag "v1.0.0"           -> builds business, release tagged "v1.0.0"
# - Push tag "admin-v1.0.0"     -> builds admin,    release tagged "admin-v1.0.0"
# - Manual dispatch (Actions UI) -> pick business or admin
on:
  push:
    tags:
      - "v*.*.*"
      - "admin-v*.*.*"
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to build"
        required: true
        default: "business"
        type: choice
        options:
          - business
          - admin

jobs:
  resolve:
    name: Resolve app from trigger
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.pick.outputs.app }}
    steps:
      - id: pick
        shell: bash
        run: |
          if [[ -n "${{ inputs.app }}" ]]; then
            APP="${{ inputs.app }}"
          elif [[ "${{ github.ref_name }}" == admin-* ]]; then
            APP="admin"
          else
            APP="business"
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "Resolved APP=$APP (ref=${{ github.ref_name }})"

  build:
    needs: resolve
    name: Build ${{ needs.resolve.outputs.app }} on Windows
    runs-on: windows-latest
    timeout-minutes: 40
    permissions:
      contents: write

    env:
      APP: ${{ needs.resolve.outputs.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Generate icons
        run: pnpm tauri icon src-tauri/source-icons/${{ env.APP }}.png --output src-tauri/icons/${{ env.APP }}

      - name: Resolve version + tag + stable filename
        id: meta
        shell: pwsh
        run: |
          $conf = Get-Content "src-tauri/tauri.${{ env.APP }}.conf.json" | ConvertFrom-Json
          $version = $conf.version
          $product = $conf.productName

          # Tag = the pushed ref if it looks like a tag, else derive from config
          if ($env:GITHUB_REF_NAME -match '^(admin-)?v\d') {
            $tag = $env:GITHUB_REF_NAME
          } elseif ($env:APP -eq "admin") {
            $tag = "admin-v$version"
          } else {
            $tag = "v$version"
          }

          # Stable filename for the landing-page link / direct download
          $stableExe = if ($env:APP -eq "admin") { "orcaa-admin.exe" } else { "orcaa-desktop.exe" }

          # Separate updater manifests per app so business and admin don't collide
          $manifestName = if ($env:APP -eq "admin") { "latest-admin.json" } else { "latest.json" }

          echo "version=$version"          >> $env:GITHUB_OUTPUT
          echo "tag=$tag"                  >> $env:GITHUB_OUTPUT
          echo "product=$product"          >> $env:GITHUB_OUTPUT
          echo "stable_exe=$stableExe"     >> $env:GITHUB_OUTPUT
          echo "manifest_name=$manifestName" >> $env:GITHUB_OUTPUT

      - name: Build + sign + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: "${{ steps.meta.outputs.product }} ${{ steps.meta.outputs.tag }}"
          releaseBody: |
            Auto-generated release built from `${{ github.sha }}`.

            Installers:
            - **`${{ steps.meta.outputs.stable_exe }}`** — stable filename used by the landing site / direct download (NSIS installer wizard)
            - `*_x64-setup.exe` — same NSIS installer, versioned filename
            - `*_x64_en-US.msi` — Windows Installer for IT-managed installs
            - `*.nsis.zip` + `*.sig` + `${{ steps.meta.outputs.manifest_name }}` — used by the in-app auto-updater (don't delete)
          releaseDraft: false
          # Admin releases are marked prerelease so GitHub's /releases/latest/ always
          # resolves to a business release (keeps the landing-page download stable).
          prerelease: ${{ env.APP == 'admin' }}
          args: --config src-tauri/tauri.${{ env.APP }}.conf.json

      - name: Upload stable-name installer + rename manifest
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $stableExe = "${{ steps.meta.outputs.stable_exe }}"
          $manifestName = "${{ steps.meta.outputs.manifest_name }}"

          # 1. Upload a copy of the NSIS setup under the stable name
          $setupExe = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*_x64-setup.exe" | Select-Object -First 1
          if ($setupExe) {
            $tempExe = Join-Path $env:RUNNER_TEMP $stableExe
            Copy-Item $setupExe.FullName $tempExe -Force
            gh release upload $tag $tempExe --clobber
            Write-Host "Uploaded $stableExe (copy of $($setupExe.Name))"
          } else {
            Write-Host "::warning::No NSIS setup.exe found at expected path"
          }

          # 2. For admin: rename uploaded latest.json -> latest-admin.json so business + admin
          #    don't fight over /releases/latest/download/latest.json. Business keeps the
          #    default 'latest.json' filename.
          if ($manifestName -ne "latest.json") {
            $tempDir = Join-Path $env:RUNNER_TEMP "manifest-rename"
            New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
            try {
              gh release download $tag --pattern "latest.json" --dir $tempDir
              if (Test-Path (Join-Path $tempDir "latest.json")) {
                $renamed = Join-Path $tempDir $manifestName
                Move-Item (Join-Path $tempDir "latest.json") $renamed -Force
                gh release upload $tag $renamed --clobber
                gh release delete-asset $tag "latest.json" --yes
                Write-Host "Renamed latest.json -> $manifestName"
              } else {
                Write-Host "::warning::No latest.json found in release to rename"
              }
            } finally {
              Remove-Item -Recurse -Force $tempDir -ErrorAction SilentlyContinue
            }
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
